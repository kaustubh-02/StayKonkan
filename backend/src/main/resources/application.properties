# =====================================================================
# StayKonkan Backend — Common configuration (all profiles)
# Profile-specific overrides live in application-dev.properties /
# application-prod.properties. Activate with:
#   --spring.profiles.active=dev   (or prod)
# =====================================================================

spring.application.name=staykonkan-backend

# Active profile default (overridden by SPRING_PROFILES_ACTIVE env var in Docker/prod)
spring.profiles.active=dev

# ---------------------------------------------------------------------
# JPA / Hibernate — common
# ---------------------------------------------------------------------
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=true
spring.jackson.time-zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false

# ---------------------------------------------------------------------
# Jackson — never leak nulls or stack traces by default
# ---------------------------------------------------------------------
spring.jackson.default-property-inclusion=non_null

# ---------------------------------------------------------------------
# Multipart (hotel/restaurant image uploads via Cloudinary, later phases)
# ---------------------------------------------------------------------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ---------------------------------------------------------------------
# Actuator — expose only safe endpoints
# ---------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ---------------------------------------------------------------------
# JWT (values overridden per-environment; secrets come from env vars)
# ---------------------------------------------------------------------
app.jwt.issuer=staykonkan
app.jwt.access-token-expiration-minutes=15
app.jwt.refresh-token-expiration-days=30
app.jwt.secret=StayKonkanDevelopmentSecretKey2026Minimum32CharactersLong

# ---------------------------------------------------------------------
# CORS (overridden per-environment)
# ---------------------------------------------------------------------
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ---------------------------------------------------------------------
# Cloudinary (configuration only in this phase — Media module consumes
# these in a later phase; values come from environment/secret manager)
# ---------------------------------------------------------------------
app.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
app.cloudinary.api-key=${CLOUDINARY_API_KEY:}
app.cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# ---------------------------------------------------------------------
# Razorpay (Module 10A — Payment Foundation). Keys come from environment/
# secret manager — never hardcoded. Never logged either (see
# RazorpayConfig / RazorpayPaymentService).
# ---------------------------------------------------------------------
app.razorpay.key-id=${RAZORPAY_KEY_ID:}
app.razorpay.key-secret=${RAZORPAY_KEY_SECRET:}

# ---------------------------------------------------------------------
# Razorpay Webhooks (Module 10B). This is a DIFFERENT secret from
# app.razorpay.key-secret above — it's configured separately in the
# Razorpay dashboard when setting up the webhook endpoint, and is used
# with a different signing scheme (HMAC over the raw request body,
# rather than over "order_id|payment_id").
# ---------------------------------------------------------------------
app.razorpay.webhook.secret=${RAZORPAY_WEBHOOK_SECRET:}

# ---------------------------------------------------------------------
# Platform payment settings. Commission percentage is configuration, not
# a business-logic constant — PaymentServiceImpl reads this rather than
# hardcoding a rate, so it can change per-environment/over time without
# a code change or redeploy of business logic.
# ---------------------------------------------------------------------
app.payment.platform-commission-percentage=10
app.payment.default-currency=INR

# ---------------------------------------------------------------------
# OpenAPI / Swagger
# ---------------------------------------------------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
