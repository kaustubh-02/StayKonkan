# =====================================================================
# StayKonkan Backend — PROD profile
# Every secret/credential is sourced from environment variables (Docker
# secrets / AWS Secrets Manager in real deployment) — nothing sensitive
# is ever committed to this file.
# =====================================================================

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:20}
spring.datasource.hikari.minimum-idle=5

# Schema changes are managed exclusively via migrations in production —
# Hibernate must never auto-alter a live production schema.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

logging.level.root=WARN
logging.level.com.staykonkan=INFO
logging.level.org.springframework.security=WARN

# Swagger is disabled in production to avoid exposing internal API
# structure publicly (Phase 1, Security Architecture).
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiration-minutes=${JWT_ACCESS_EXP_MIN:15}
app.jwt.refresh-token-expiration-days=${JWT_REFRESH_EXP_DAYS:30}

management.endpoint.health.show-details=never
management.endpoints.web.exposure.include=health
