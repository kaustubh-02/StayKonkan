# =====================================================================
# StayKonkan Backend — DEV profile
# Local development: verbose logging, permissive CORS, SQL visible,
# Swagger UI enabled, schema auto-managed by Hibernate for fast iteration.
# =====================================================================

spring.datasource.url=jdbc:postgresql://localhost:5432/staykonkan_dev
spring.datasource.username=postgres
spring.datasource.password=CAT
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.root=INFO
logging.level.com.staykonkan=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# Dev-only convenience
app.jwt.access-token-expiration-minutes=15